<script>
        function checkStrength(password) {
            const bar = document.getElementById('strength-bar');
            const text = document.getElementById('strength-text');
            
            if (password.length === 0) {
                bar.style.width = '0%';
                text.innerText = 'Enter at least 8 characters';
                text.className = 'font-label-sm text-label-sm mt-1 text-on-surface-variant';
                return;
            }

            let strength = 0;
            if (password.length >= 8) strength += 25;
            if (password.match(/[a-z]/) && password.match(/[A-Z]/)) strength += 25;
            if (password.match(/\d/)) strength += 25;
            if (password.match(/[^a-zA-Z\d]/)) strength += 25;

            bar.style.width = strength + '%';

            if (strength <= 25) {
                bar.className = 'h-full bg-error transition-all duration-500 ease-out';
                text.innerText = 'Weak';
                text.className = 'font-label-sm text-label-sm mt-1 text-error';
            } else if (strength <= 50) {
                bar.className = 'h-full bg-orange-500 transition-all duration-500 ease-out';
                text.innerText = 'Fair';
                text.className = 'font-label-sm text-label-sm mt-1 text-orange-500';
            } else if (strength <= 75) {
                bar.className = 'h-full bg-secondary-container transition-all duration-500 ease-out';
                text.innerText = 'Strong';
                text.className = 'font-label-sm text-label-sm mt-1 text-secondary-container';
            } else {
                bar.className = 'h-full bg-tertiary-container transition-all duration-500 ease-out';
                text.innerText = 'Very Strong';
                text.className = 'font-label-sm text-label-sm mt-1 text-tertiary-container';
            }
        }

        // Toggle Password Visibility
        const toggleBtn = document.querySelector('form button[type="button"]');
        const passInput = document.getElementById('password');
        toggleBtn.addEventListener('click', () => {
            const type = passInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passInput.setAttribute('type', type);
            const icon = toggleBtn.querySelector('span');
            icon.innerText = type === 'password' ? 'visibility' : 'visibility_off';
        });
    </script>
